name: Build and Publish Multi-Platform Docker Image (Parallel)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # 每个平台单独构建
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - linux/s390x
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set tag suffix based on platform
        run: |
          case "${{ matrix.platform }}" in
            linux/amd64)   SUFFIX="amd64" ;;
            linux/arm64)   SUFFIX="arm64" ;;
            linux/arm/v7)  SUFFIX="armv7" ;;
            linux/s390x)   SUFFIX="s390x" ;;
            *)             SUFFIX="unknown" ;;
          esac
          echo "TAG_SUFFIX=${SUFFIX}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. 登录 GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 登录 Docker Hub（需要在 GitHub Repository Settings -> Secrets 中配置 DOCKERHUB_USERNAME 和 DOCKERHUB_TOKEN）
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. 同时推送到两个 Registry 的单架构 Tag
      - name: Build and push for ${{ matrix.platform }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/tinyimage-server:latest-${{ env.TAG_SUFFIX }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tinyimage-server:latest-${{ env.TAG_SUFFIX }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false
          sbom: false

  merge-manifest:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-platform manifest
        run: |
          # 合并 GHCR Manifest
          GHCR_BASE="ghcr.io/$OWNER_LC/tinyimage-server"
          docker buildx imagetools create -t $GHCR_BASE:latest \
            $GHCR_BASE:latest-amd64 \
            $GHCR_BASE:latest-arm64 \
            $GHCR_BASE:latest-armv7 \
            $GHCR_BASE:latest-s390x
            
          # 合并 Docker Hub Manifest
          DH_BASE="${{ secrets.DOCKERHUB_USERNAME }}/tinyimage-server"
          docker buildx imagetools create -t $DH_BASE:latest \
            $DH_BASE:latest-amd64 \
            $DH_BASE:latest-arm64 \
            $DH_BASE:latest-armv7 \
            $DH_BASE:latest-s390x

      - name: Delete per-platform tags (optional)
        run: |
          GHCR_BASE="ghcr.io/$OWNER_LC/tinyimage-server"
          DH_BASE="${{ secrets.DOCKERHUB_USERNAME }}/tinyimage-server"
          for suffix in amd64 arm64 armv7 s390x; do
            skopeo delete docker://$GHCR_BASE:latest-$suffix || true
            skopeo delete docker://$DH_BASE:latest-$suffix || true
          done
        continue-on-error: true