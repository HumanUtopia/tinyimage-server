name: Build and Publish Multi-Platform Docker Image (Parallel)

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - linux/s390x
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set Environment Variables
        run: |
          # 1. 解析架构后缀
          case "${{ matrix.platform }}" in
            linux/amd64)   SUFFIX="amd64" ;;
            linux/arm64)   SUFFIX="arm64" ;;
            linux/arm/v7)  SUFFIX="armv7" ;;
            linux/s390x)   SUFFIX="s390x" ;;
            *)             SUFFIX="unknown" ;;
          esac
          echo "TAG_SUFFIX=${SUFFIX}" >> $GITHUB_ENV
          
          # 2. 提取当前 Git 提交的短哈希
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHA_SHORT=${SHA_SHORT}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 推送单架构镜像，使用 buildcache 而不是 gha 缓存
      - name: Build and push for ${{ matrix.platform }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/tinyimage-server:tmp-${{ env.SHA_SHORT }}-${{ env.TAG_SUFFIX }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tinyimage-server:tmp-${{ env.SHA_SHORT }}-${{ env.TAG_SUFFIX }}
          platforms: ${{ matrix.platform }}
          # 关键改进：使用 registry 缓存（支持跨架构共享��
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          provenance: false
          sbom: false

  merge-manifest:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set short SHA
        run: echo "SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 动态生成最终的 tag 列表
      - name: Generate Final Tags
        id: final-tags
        run: |
          GHCR_BASE="ghcr.io/$OWNER_LC/tinyimage-server"
          DH_BASE="${{ secrets.DOCKERHUB_USERNAME }}/tinyimage-server"
          
          if [ "${{ github.event_name }}" = "release" ]; then
            REL_TAG="${{ github.event.release.tag_name }}"
            echo "ghcr_tags=$GHCR_BASE:latest $GHCR_BASE:$REL_TAG" >> $GITHUB_OUTPUT
            echo "dh_tags=$DH_BASE:latest $DH_BASE:$REL_TAG" >> $GITHUB_OUTPUT
          else
            BRANCH="${{ github.ref_name }}"
            echo "ghcr_tags=$GHCR_BASE:$BRANCH" >> $GITHUB_OUTPUT
            echo "dh_tags=$DH_BASE:$BRANCH" >> $GITHUB_OUTPUT
          fi

      # 合并 manifest（从单架构临时镜像合并为多架构镜像）
      - name: Create and push multi-platform manifest
        run: |
          GHCR_BASE="ghcr.io/$OWNER_LC/tinyimage-server"
          DH_BASE="${{ secrets.DOCKERHUB_USERNAME }}/tinyimage-server"
          
          # 为每个最终 tag 创建 manifest
          for tag in ${{ steps.final-tags.outputs.ghcr_tags }}; do
            docker buildx imagetools create \
              -t "$tag" \
              "$GHCR_BASE:tmp-$SHA_SHORT-amd64" \
              "$GHCR_BASE:tmp-$SHA_SHORT-arm64" \
              "$GHCR_BASE:tmp-$SHA_SHORT-armv7" \
              "$GHCR_BASE:tmp-$SHA_SHORT-s390x"
          done
          
          for tag in ${{ steps.final-tags.outputs.dh_tags }}; do
            docker buildx imagetools create \
              -t "$tag" \
              "$DH_BASE:tmp-$SHA_SHORT-amd64" \
              "$DH_BASE:tmp-$SHA_SHORT-arm64" \
              "$DH_BASE:tmp-$SHA_SHORT-armv7" \
              "$DH_BASE:tmp-$SHA_SHORT-s390x"
          done

      # 清理临时镜像标签
      - name: Delete per-platform tags
        run: |
          GHCR_BASE="ghcr.io/$OWNER_LC/tinyimage-server"
          DH_BASE="${{ secrets.DOCKERHUB_USERNAME }}/tinyimage-server"
          
          for suffix in amd64 arm64 armv7 s390x; do
            # 尝试删除 GHCR 临时标签
            docker buildx du --verbose || true
            echo "Attempting to delete $GHCR_BASE:tmp-$SHA_SHORT-$suffix"
            skopeo delete docker://$GHCR_BASE:tmp-$SHA_SHORT-$suffix || true
            skopeo delete docker://$DH_BASE:tmp-$SHA_SHORT-$suffix || true
          done
        continue-on-error: true