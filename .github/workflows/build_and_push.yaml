name: Build and Publish Multi-Platform Docker Image (Parallel)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # 每个平台单独构建
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - linux/s390x
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set tag suffix based on platform
        run: |
          case "${{ matrix.platform }}" in
            linux/amd64)   SUFFIX="amd64" ;;
            linux/arm64)   SUFFIX="arm64" ;;
            linux/arm/v7)  SUFFIX="armv7" ;;
            linux/s390x)   SUFFIX="s390x" ;;
            *)             SUFFIX="unknown" ;;
          esac
          echo "TAG_SUFFIX=${SUFFIX}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push for ${{ matrix.platform }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/tinyimage-server:latest-${{ env.TAG_SUFFIX }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false
          sbom: false

  merge-manifest:
      runs-on: ubuntu-latest
      needs: build
      permissions:
        contents: read
        packages: write

      steps:
        - name: Set lowercase owner name
          run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

        - name: Log in to GHCR
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
          
        # 1. 引入 Buildx（imagetools 依赖它）
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        # 2. 使用 buildx imagetools create 代替原先的 docker manifest
        - name: Create and push multi-platform manifest
          run: |
            IMAGE_BASE="ghcr.io/$OWNER_LC/tinyimage-server"
            docker buildx imagetools create -t $IMAGE_BASE:latest \
              $IMAGE_BASE:latest-amd64 \
              $IMAGE_BASE:latest-arm64 \
              $IMAGE_BASE:latest-armv7 \
              $IMAGE_BASE:latest-s390x

        # 后续的删除单平台 tag 步骤保持不变
        - name: Delete per-platform tags (optional)
          run: |
            IMAGE_BASE="ghcr.io/$OWNER_LC/tinyimage-server"
            for suffix in amd64 arm64 armv7 s390x; do
              skopeo delete docker://$IMAGE_BASE:latest-$suffix || true
            done
          continue-on-error: true